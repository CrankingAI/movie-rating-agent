name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        shell: bash
        run: |
          source scripts/deploy-config.sh
          {
            echo "AZURE_LOCATION=${LOCATION}"
            echo "AZURE_RESOURCE_GROUP=${RESOURCE_GROUP}"
            echo "AZURE_FUNCTION_APP=${FUNCTION_APP}"
            echo "AZURE_FUNCTION_HOST=${FUNCTION_HOST}"
            echo "AZURE_SWA_NAME=${SWA_NAME}"
            echo "AZURE_SWA_DEPLOY_ENV=${SWA_DEPLOY_ENV}"
          } >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ env.AZURE_LOCATION }}
          deploymentName: movie-rating-agent-${{ github.run_id }}
          template: infra/main.bicep
          parameters: infra/main.bicepparam

  deploy-code:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        shell: bash
        run: |
          source scripts/deploy-config.sh
          {
            echo "AZURE_RESOURCE_GROUP=${RESOURCE_GROUP}"
            echo "AZURE_FUNCTION_APP=${FUNCTION_APP}"
            echo "AZURE_FUNCTION_HOST=${FUNCTION_HOST}"
            echo "AZURE_SWA_NAME=${SWA_NAME}"
            echo "AZURE_SWA_DEPLOY_ENV=${SWA_DEPLOY_ENV}"
          } >> "$GITHUB_ENV"

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Functions (v${{ steps.version.outputs.version }})
        run: dotnet publish src/MovieRatingAgent.Functions/MovieRatingAgent.Functions.csproj --configuration Release --output ./publish

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP }}
          package: ./publish

      - name: Deploy SWA
        run: |
          DEPLOY_TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.AZURE_SWA_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          npx -y @azure/static-web-apps-cli deploy ./swa \
            --deployment-token "$DEPLOY_TOKEN" \
            --env "${{ env.AZURE_SWA_DEPLOY_ENV }}"

      - name: Verify Function App deployment
        shell: bash
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          for attempt in $(seq 1 12); do
            READYZ=$(curl -sf "https://${{ env.AZURE_FUNCTION_HOST }}/api/readyz" || true)
            DEPLOYED=$(echo "$READYZ" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true)
            DEPLOYED_COMMIT=$(echo "$READYZ" | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit','')[:7])" 2>/dev/null || true)
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "Verified Function App: v${DEPLOYED} (${DEPLOYED_COMMIT:-unknown})"
              exit 0
            fi
            echo "Waiting for Function App (${attempt}/12)..."
            sleep 10
          done
          echo "::error::Function App version drift: expected v${EXPECTED}, got v${DEPLOYED:-?}"
          exit 1

      - name: Verify SWA route and backend
        shell: bash
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          SWA_HOST=$(az staticwebapp show \
            --name "${{ env.AZURE_SWA_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query defaultHostname -o tsv)
          curl -sfI "https://${SWA_HOST}/" >/dev/null
          for attempt in $(seq 1 12); do
            READYZ=$(curl -sf "https://${SWA_HOST}/api/readyz" || true)
            DEPLOYED=$(echo "$READYZ" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true)
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "Verified SWA backend route: v${DEPLOYED}"
              exit 0
            fi
            echo "Waiting for SWA backend (${attempt}/12)..."
            sleep 10
          done
          echo "::error::SWA backend route did not report expected version v${EXPECTED}"
          exit 1
