receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  file/traces:
    path: /otel-export/traces.jsonl
    rotation:
      max_megabytes: 100
      max_backups: 3
  file/metrics:
    path: /otel-export/metrics.jsonl
    rotation:
      max_megabytes: 50
      max_backups: 3
  file/logs:
    path: /otel-export/logs.jsonl
    rotation:
      max_megabytes: 50
      max_backups: 3

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file/traces]
    metrics:
      receivers: [otlp]
      exporters: [file/metrics]
    logs:
      receivers: [otlp]
      exporters: [file/logs]
